name: Deploy Catalog to GCP (catalog.vectorinstitute.ai)

on:
  push:
    branches:
      - main
    paths:
      - 'catalog/**'
      - 'repositories/**'
      - 'scripts/sync_repositories_to_json.py'
      - 'scripts/collect_pypi_metrics.py'
      - '.github/workflows/deploy-catalog-gcp.yml'
  workflow_dispatch:
  # Auto-trigger when metrics are updated
  workflow_run:
    workflows: ["Collect GitHub Metrics"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: "gcp-catalog-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Only deploy if metrics collection succeeded (or if triggered by push/manual)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: catalog/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.11"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: uv pip install --system pyyaml requests

      - name: Sync YAML repositories to JSON
        run: python scripts/sync_repositories_to_json.py

      - name: Collect PyPI metrics
        run: python scripts/collect_pypi_metrics.py
        continue-on-error: true

      - name: Install Node dependencies
        working-directory: catalog
        run: npm ci

      - name: Build Next.js site for GCP (root domain)
        working-directory: catalog
        run: npm run build
        env:
          # Build for root domain (no base path needed for catalog.vectorinstitute.ai)
          NODE_ENV: production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to GCS
        run: |
          # Sync files to GCS bucket
          gcloud storage rsync \
            --recursive \
            --delete-unmatched-destination-objects \
            catalog/out/ \
            gs://catalog-vectorinstitute-ai/

      - name: Set cache headers for static assets
        run: |
          # Set cache headers for static assets (CSS, JS, images)
          # _next/static has immutable hashed filenames, so cache for 1 year
          gcloud storage objects update "gs://catalog-vectorinstitute-ai/_next/static/**" \
            --cache-control="public, max-age=31536000, immutable" \
            --recursive || true

          # Cache other static assets for 1 hour
          gcloud storage objects update "gs://catalog-vectorinstitute-ai/_next/**" \
            --cache-control="public, max-age=3600" \
            --recursive || true

          # HTML files should be revalidated frequently
          gcloud storage objects update "gs://catalog-vectorinstitute-ai/**.html" \
            --cache-control="public, max-age=300, must-revalidate" \
            --recursive || true

          # Index files need fresh content
          gcloud storage objects update "gs://catalog-vectorinstitute-ai/index.html" \
            --cache-control="public, max-age=60, must-revalidate" || true

      - name: Set content types
        run: |
          # Ensure proper content types for common files
          gcloud storage objects update "gs://catalog-vectorinstitute-ai/**.json" \
            --content-type="application/json" \
            --recursive || true

          gcloud storage objects update "gs://catalog-vectorinstitute-ai/**.xml" \
            --content-type="application/xml" \
            --recursive || true

      - name: Update security headers with fresh CSP hashes
        run: |
          # Extract SHA-256 hashes of all inline <script> blocks in the built index.html.
          # Next.js RSC data payloads are inline scripts whose content changes every build,
          # so the hashes must be recomputed and pushed to the load balancer after each deploy.
          HASHES=$(python3 - <<'EOF'
          import re, hashlib, base64
          html = open("catalog/out/index.html").read()
          scripts = re.findall(r'<script(?! src)[^>]*>(.*?)</script>', html, re.DOTALL)
          hashes = []
          for s in scripts:
              s = s.strip()
              if s:
                  h = base64.b64encode(hashlib.sha256(s.encode()).digest()).decode()
                  hashes.append(f"'sha256-{h}'")
          print(" ".join(hashes))
          EOF
          )

          # wasm-unsafe-eval: required for Pagefind's WebAssembly search index.
          # style-src unsafe-inline: Next.js injects inline styles for critical CSS.
          CSP="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' ${HASHES}; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

          gcloud compute backend-buckets update catalog-backend-bucket \
            --project=coderd \
            --custom-response-header="Strict-Transport-Security: max-age=31536000; includeSubDomains" \
            --custom-response-header="X-Frame-Options: DENY" \
            --custom-response-header="X-Content-Type-Options: nosniff" \
            --custom-response-header="Referrer-Policy: strict-origin-when-cross-origin" \
            --custom-response-header="Permissions-Policy: camera=(), microphone=(), geolocation=(), payment=()" \
            --custom-response-header="Content-Security-Policy: ${CSP}"

          echo "✅ Security headers updated with $(echo $HASHES | wc -w) inline script hashes"

          # Invalidate CDN cache so stale CSP headers are not served alongside
          # the new HTML (mismatched hashes would break the site).
          gcloud compute url-maps invalidate-cdn-cache catalog-url-map \
            --project=coderd \
            --path "/*"
          echo "✅ CDN cache invalidated"

      - name: Deployment summary
        run: |
          echo "✅ Catalog deployed successfully to GCS!"
          echo "📦 Bucket: gs://catalog-vectorinstitute-ai"
          echo "🌐 https://catalog.vectorinstitute.ai"
